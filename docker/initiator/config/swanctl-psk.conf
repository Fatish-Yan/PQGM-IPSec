# PQ-GM-IKEv2 完整 5-RTT 协议配置 - PSK 认证模式
# Triple Key Exchange: x25519 + SM2-KEM + ML-KEM-768
# Authentication: PSK (用于测试 5RTT 流程)
#
# 协议流程:
# RTT 1: IKE_SA_INIT (协商 x25519 + SM2-KEM + ML-KEM-768)
# RTT 2: IKE_INTERMEDIATE #0 (空 - PSK 不需要证书分发)
# RTT 3: IKE_INTERMEDIATE #1 (SM2-KEM 密钥交换)
# RTT 4: IKE_INTERMEDIATE #2 (ML-KEM-768 密钥交换)
# RTT 5: IKE_AUTH (PSK 认证)

connections {
    pqgm-5rtt-psk {
        version = 2
        local_addrs = 172.28.0.10
        remote_addrs = 172.28.0.20

        # IKE SA proposals - 三重密钥交换
        # KE=x25519, ADDKE1=SM2-KEM, ADDKE2=ML-KEM-768
        proposals = aes256-sha256-x25519-ke1_sm2kem-ke2_mlkem768

        # PSK 认证
        local {
            auth = psk
            id = initiator.pqgm.test
        }

        remote {
            auth = psk
            id = responder.pqgm.test
        }

        children {
            net {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16

                # ESP proposals
                esp_proposals = aes256gcm16-sha256

                start_action = none
            }
        }
    }
}

secrets {
    # PSK - 两端相同
    ike-pqgm {
        id-1 = initiator.pqgm.test
        id-2 = responder.pqgm.test
        secret = 0x5051474d323032365f50534b5f546573745f5365637265744b6579
    }
}
