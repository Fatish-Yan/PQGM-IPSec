# PQ-GM-IKEv2 证书认证配置
# 用于测试 IKE_AUTH 阶段的 ECDSA 证书认证 + IntAuth 绑定
#
# 注意：
# - IKE_INTERMEDIATE 阶段使用 SM2 双证书（signCert/encCert）
# - IKE_AUTH 阶段使用 ECDSA authCert（本配置中的证书）
# - 两套证书是独立的

connections {
    pqgm-ikev2-cert {
        version = 2
        local_addrs = 172.28.0.10
        remote_addrs = 172.28.0.20
        proposals = aes256-sha256-x25519-ke1_sm2kem-ke2_mlkem768
        send_certreq = yes

        local {
            # 使用 ECDSA 证书认证
            auth = ecdsa
            id = initiator.pqgm.test
            # IKE_AUTH 阶段的认证证书（独立于 SM2 双证书）
            # 文件在 x509/ 目录下
            certs = auth_ecdsa_cert.pem
        }

        remote {
            auth = ecdsa
            id = responder.pqgm.test
            # 明确指定信任的 CA 证书
            cacerts = auth_ca.pem
        }

        children {
            ipsec {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }
}

secrets {
    # ECDSA 私钥用于 IKE_AUTH 签名
    ecdsa-initiator {
        id = initiator.pqgm.test
        file = auth_ecdsa_key.pem
    }
}
