version: '3.8'

services:
  initiator:
    image: ubuntu:22.04
    container_name: pqgm-initiator
    hostname: initiator.pqgm.test
    networks:
      pqgm_net:
        ipv4_address: 172.28.0.10
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /usr/local:/usr/local:rw
      - ./initiator/config:/config:ro
      - ./initiator/certs:/certs:ro
      - /lib:/lib:ro
      - /lib64:/lib64:ro
      - /usr/lib:/usr/lib:ro
    command: /bin/bash -c "mkdir -p /usr/local/etc/swanctl/x509 /usr/local/etc/swanctl/x509ca /usr/local/etc/swanctl/private && cp /config/* /usr/local/etc/ -r && cp /certs/* /usr/local/etc/swanctl/x509/ -r && cp /certs/encKey.pem /usr/local/etc/swanctl/private/ && cp /certs/signKey.pem /usr/local/etc/swanctl/private/ && cp /certs/caCert.pem /usr/local/etc/swanctl/x509ca/ && sleep infinity"

  responder:
    image: ubuntu:22.04
    container_name: pqgm-responder
    hostname: responder.pqgm.test
    networks:
      pqgm_net:
        ipv4_address: 172.28.0.20
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /usr/local:/usr/local:rw
      - ./responder/config:/config:ro
      - ./responder/certs:/certs:ro
      - /lib:/lib:ro
      - /lib64:/lib64:ro
      - /usr/lib:/usr/lib:ro
    command: /bin/bash -c "mkdir -p /usr/local/etc/swanctl/x509 /usr/local/etc/swanctl/x509ca /usr/local/etc/swanctl/private && cp /config/* /usr/local/etc/ -r && cp /certs/* /usr/local/etc/swanctl/x509/ -r && cp /certs/encKey.pem /usr/local/etc/swanctl/private/ && cp /certs/signKey.pem /usr/local/etc/swanctl/private/ && cp /certs/caCert.pem /usr/local/etc/swanctl/x509ca/ && sleep infinity"

networks:
  pqgm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
