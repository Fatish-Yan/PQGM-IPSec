# PQ-GM-IKEv2 完整 5-RTT 协议配置 + ML-DSA 后量子认证
# Triple Key Exchange: x25519 + ML-KEM-768 + SM2-KEM
# Post-Quantum Authentication: ML-DSA-65

connections {
    # Baseline 配置 (AES-256 + SHA-256)
    pqgm-5rtt-mldsa {
        version = 2
        local_addrs = 172.28.0.20
        remote_addrs = 172.28.0.10

        # IKE SA proposals - 三重密钥交换
        # KE=x25519, ADDKE1=SM2-KEM, ADDKE2=ML-KEM-768
        proposals = aes256-sha256-x25519-ke1_sm2kem-ke2_mlkem768

        local {
            auth = pubkey
            id = responder.pqgm.test
            # ML-DSA 混合证书
            certs = responder_hybrid_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
            # NOTE: cacerts removed for experimental ML-DSA hybrid cert testing
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }

    # 国密对称栈配置 (SM4-CBC + HMAC-SM3)
    # 用于对比测试国密对称算法与标准算法的性能
    pqgm-5rtt-gm-symm {
        version = 2
        local_addrs = 172.28.0.20
        remote_addrs = 172.28.0.10

        # IKE SA proposals - 国密对称栈
        # ENCR=SM4-CBC(1041), INTEG=HMAC-SM3-128(1056), PRF=PRF-SM3(1052)
        # KE=x25519(31), ADDKE1=SM2-KEM(1051), ADDKE2=ML-KEM-768
        # 使用数字ID格式，因为 strongSwan 可能不识别 sm4/sm3 字符串
        proposals = 1041-1056-1052-31-ke1_1051-ke2_mlkem768

        local {
            auth = pubkey
            id = responder.pqgm.test
            certs = responder_hybrid_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16

                # ESP proposals - 国密对称栈
                # SM4-CBC + HMAC-SM3-128 (非 AEAD)
                esp_proposals = 1041-1056

                start_action = none
            }
        }
    }
}

secrets {
    # ML-DSA 私钥
    mldsa-key {
        id = responder.pqgm.test
        file = responder_mldsa_key.bin
        type = mldsa
    }

    # SM2 加密私钥 (用于 SM2-KEM)
    sm2-enc {
        id = responder.pqgm.test
        file = enc_key.pem
    }
}
