charon {
    load_modular = yes
    accept_private_algs = yes

    # Relax certificate constraints
    x509 {
        enforce_critical = no
    }

    filelog {
        stdout {
            default = 2
            ike = 3
            cfg = 2
            net = 2
            lib = 2
        }
    }

    plugins {
        include /usr/local/etc/strongswan.d/charon/*.conf

        # gmalg 插件配置 (替代硬编码路径)
        gmalg {
            load = yes
            # SM2 双证书配置 (文件名，放在 /usr/local/etc/swanctl/x509/)
            sign_cert = signCert.pem
            enc_cert = encCert.pem
            # SM2 加密私钥 (放在 /usr/local/etc/swanctl/private/)
            enc_key = enc_key.pem
            # 私钥密码
            enc_key_secret = PQGM2026
        }
    }
}
include /usr/local/etc/strongswan.d/*.conf
