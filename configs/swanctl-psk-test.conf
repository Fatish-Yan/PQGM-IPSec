# PQ-GM-IKEv2 本地回环测试 - 使用 PSK 认证
# 测试 ML-KEM 协议流程

connections {
    pqgm-psk {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals with ML-KEM
        proposals = aes256-sha256-x25519-ke1_mlkem768

        local {
            auth = psk
            id = local.pqgm.test
        }

        remote {
            auth = psk
            id = local.pqgm.test
        }

        children {
            ipsec {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16

                esp_proposals = aes256gcm16-x25519-ke1_mlkem768

                updown = /usr/local/libexec/ipsec/_updown iptables
            }
        }
    }
}

secrets {
    ike-psk {
        id = local.pqgm.test
        secret = "test123456"
    }
}
