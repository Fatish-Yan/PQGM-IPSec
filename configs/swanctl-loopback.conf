# PQ-GM-IKEv2 本地回环测试配置
# Triple Key Exchange: x25519 + ML-KEM-768 + SM2-KEM
# 创建时间: 2026-02-27

connections {
    pqgm-loopback {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals with triple key exchange
        # KE=x25519, ke1_=ml-kem-768, ke2_=sm2-kem
        proposals = aes256-sha384-x25519-ke1_mlkem768-ke2_sm2kem

        local {
            auth = pubkey
            certs = sign_cert.pem
            id = local.pqgm.test
        }

        remote {
            auth = pubkey
            id = local.pqgm.test
        }

        children {
            ipsec {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16

                # ESP proposals with triple key exchange
                esp_proposals = aes256gcm256-x25519-ke1_mlkem768-ke2_sm2kem

                updown = /usr/local/libexec/ipsec/_updown iptables
            }
        }
    }
}

secrets {
    sm2-sign {
        file = sign_key.pem
        secret = "PQGM2026"
    }
    sm2-enc {
        file = enc_key.pem
        secret = "PQGM2026"
    }
}
