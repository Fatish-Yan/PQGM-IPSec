# PQ-GM-IKEv2 本地回环测试 - 使用 PSK 认证
# 修复流量选择器问题

connections {
    pqgm-loopback {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals with ML-KEM
        proposals = aes256-sha256-x25519-ke1_mlkem768

        local {
            auth = psk
            id = local.pqgm.test
        }

        remote {
            auth = psk
            id = local.pqgm.test
        }

        children {
            ipsec {
                # 使用本地回环地址作为流量选择器
                local_ts = 127.0.0.1/32
                remote_ts = 127.0.0.1/32

                esp_proposals = aes256gcm16-x25519-ke1_mlkem768

                updown = /usr/local/libexec/ipsec/_updown iptables
                start_action = none
            }
        }
    }
}

secrets {
    ike-psk {
        id = local.pqgm.test
        secret = "test123456"
    }
}
