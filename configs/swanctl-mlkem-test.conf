# PQ-GM-IKEv2 测试配置 - 使用 ML-KEM (已知可用)
# 基于 pqgm-test 的现有证书

connections {
    # 测试 ML-KEM 混合密钥交换 (x25519 + ML-KEM-768)
    pqgm-mlkem {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals with ML-KEM
        proposals = aes256-sha256-x25519-ke1_mlkem768

        local {
            auth = pubkey
            certs = initiatorCert.pem
            id = initiator.pqgm.test
        }

        remote {
            auth = pubkey
            id = responder.pqgm.test
        }

        children {
            ipsec {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16

                esp_proposals = aes256gcm16-x25519-ke1_mlkem768

                updown = /usr/local/libexec/ipsec/_updown iptables
            }
        }
    }
}

secrets {
    ed25519 {
        file = initiatorKey.pem
    }
}
