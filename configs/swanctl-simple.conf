# PQ-GM-IKEv2 本地回环测试 - 简化版本
# 测试 ML-KEM 协议流程 (IKE SA 层面)

connections {
    pqgm-simple {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals with ML-KEM
        proposals = aes256-sha256-x25519-ke1_mlkem768

        local {
            auth = psk
            id = local.pqgm.test
        }

        remote {
            auth = psk
            id = local.pqgm.test
        }

        children {
            # 简化 ESP 提案，不包含额外的 KE
            ipsec {
                local_ts = dynamic
                remote_ts = dynamic

                esp_proposals = aes256gcm16-sha256

                start_action = none
            }
        }
    }
}

secrets {
    ike-psk {
        id = local.pqgm.test
        secret = "test123456"
    }
}
