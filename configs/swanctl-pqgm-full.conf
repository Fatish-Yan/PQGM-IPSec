# PQ-GM-IKEv2 完整 5-RTT 协议配置
# Triple Key Exchange: x25519 + ML-KEM-768 + SM2-KEM
#
# 协议流程:
# RTT 1: IKE_SA_INIT (协商 x25519 + ML-KEM-768 + SM2-KEM)
# RTT 2: IKE_INTERMEDIATE #0 (双证书分发 SignCert + EncCert)
# RTT 3: IKE_INTERMEDIATE #1 (SM2-KEM 密钥交换)
# RTT 4: IKE_INTERMEDIATE #2 (ML-KEM-768 密钥交换)
# RTT 5: IKE_AUTH (签名认证)

connections {
    pqgm-ikev2 {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1

        # IKE SA proposals - 三重密钥交换
        # KE=x25519, ke1_=ml-kem-768, ke2_=sm2-kem
        proposals = aes256-sha256-x25519-ke1_mlkem768-ke2_sm2kem

        local {
            auth = pubkey
            certs = signCert.pem
            id = initiator-sign.pqgm.test
        }

        remote {
            auth = pubkey
            id = responder-sign.pqgm.test
        }

        children {
            ipsec {
                local_ts = dynamic
                remote_ts = dynamic

                # ESP proposals
                esp_proposals = aes256gcm16-sha256

                start_action = none
            }
        }
    }
}

secrets {
    # 签名私钥
    sign {
        file = signKey.pem
    }
    # 加密私钥 (用于 SM2-KEM)
    enc {
        file = encKey.pem
    }
}
