# Local loopback test configuration
# Usage: cp configs/loopback/swanctl.conf /usr/local/etc/swanctl/swanctl.conf

connections {
    pqgm-ikev2 {
        version = 2
        local_addrs = 127.0.0.1
        remote_addrs = 127.0.0.1
        proposals = aes256-sha256-x25519-ke1_sm2kem-ke2_mlkem768

        local {
            auth = pubkey
            certs = signCert.pem
            id = initiator-sign.pqgm.test
        }

        remote {
            auth = pubkey
            id = responder-sign.pqgm.test
        }

        children {
            ipsec {
                local_ts = 10.1.0.0/16
                remote_ts = 10.2.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }
}

secrets {
    sign { file = signKey.pem }
    enc { file = encKey.pem }
}
