# PQ-GM-IKEv2 四提案对比测试配置
# VM双机测试 - Responder配置
#
# 提案列表:
# 1. standard-ikev2: 标准 IKEv2 (2-RTT, x25519 + ECDSA)
# 2. pq-3rtt-mlkem: 纯后量子 (3-RTT, x25519 + ML-KEM-768 + ML-DSA)
# 3. pqgm-5rtt-mldsa: 国密融合 (5-RTT, x25519 + SM2-KEM + ML-KEM-768 + ML-DSA)
# 4. pqgm-5rtt-gm-symm: 国密对称栈 (5-RTT, 同上 + SM4/SM3)

connections {
    # ============================================
    # 提案1: 标准 IKEv2 (2-RTT) - 传统基准
    # ============================================
    standard-ikev2 {
        version = 2
        local_addrs = 192.168.172.132
        remote_addrs = 192.168.172.134

        proposals = aes256-sha256-x25519

        local {
            auth = pubkey
            id = responder.pqgm.test
            certs = responder_ecdsa_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
            cacerts = ecdsa_ca.pem
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }

    # ============================================
    # 提案2: 纯后量子 (3-RTT) - 后量子基准
    # ============================================
    pq-3rtt-mlkem {
        version = 2
        local_addrs = 192.168.172.132
        remote_addrs = 192.168.172.134

        proposals = aes256-sha256-x25519-ke1_mlkem768

        local {
            auth = pubkey
            id = responder.pqgm.test
            certs = responder_hybrid_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
            cacerts = mldsa_ca.pem
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }

    # ============================================
    # 提案3: 国密融合 (5-RTT) - 标准算法栈
    # ============================================
    pqgm-5rtt-mldsa {
        version = 2
        local_addrs = 192.168.172.132
        remote_addrs = 192.168.172.134

        proposals = aes256-sha256-x25519-ke1_sm2kem-ke2_mlkem768

        local {
            auth = pubkey
            id = responder.pqgm.test
            certs = responder_hybrid_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
            cacerts = mldsa_ca.pem
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16
                esp_proposals = aes256gcm16-sha256
                start_action = none
            }
        }
    }

    # ============================================
    # 提案4: 国密融合 (5-RTT) - 国密对称栈
    # ============================================
    pqgm-5rtt-gm-symm {
        version = 2
        local_addrs = 192.168.172.132
        remote_addrs = 192.168.172.134

        proposals = sm4-hmacsm3-prfsm3-x25519-ke1_sm2kem-ke2_mlkem768

        local {
            auth = pubkey
            id = responder.pqgm.test
            certs = responder_hybrid_cert.pem
        }

        remote {
            auth = pubkey
            id = initiator.pqgm.test
            cacerts = mldsa_ca.pem
        }

        children {
            net {
                local_ts = 10.2.0.0/16
                remote_ts = 10.1.0.0/16
                esp_proposals = aes256gcm16
                start_action = none
            }
        }
    }
}

secrets {
    # ECDSA 私钥 (用于标准 IKEv2)
    ecdsa-key {
        id = responder.pqgm.test
        file = responder_ecdsa_key.pem
    }

    # ML-DSA 私钥
    mldsa-key {
        id = responder.pqgm.test
        file = responder_mldsa_key.bin
    }
}
